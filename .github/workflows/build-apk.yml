name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm deps
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest with permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if grep -q "<manifest" "$MANIFEST"; then
            # Inject permissions before <application
            python3 << 'PYEOF'
          import re
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f: src = f.read()
          perms = '''
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.SEND_SMS" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.READ_CALL_LOG" />
              <uses-permission android:name="android.permission.READ_PHONE_STATE" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
          '''
          src = re.sub(r'(<application)', perms + r'\n    \1', src, count=1)
          with open(path, 'w') as f: f.write(src)
          print("Manifest patched.")
          PYEOF
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (release unsigned)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/jarvis-phone-${{ github.run_number }}.apk
          ls -la output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-phone-apk
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: JARVIS Phone v1.0.${{ github.run_number }}
          body: |
            JARVIS · application Android companion.
            Installe l'APK sur ton Mi 9T Pro (autorise les sources inconnues).
            À l'ouverture, saisis l'URL VPS Jarvis OS + token.
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
