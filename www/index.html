<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0d0e14" />
<title>JARVIS · Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e14;
    --bg-2: #14161f;
    --border: rgba(255,255,255,0.08);
    --fg: #e8ecf2;
    --fg-faint: #6a7589;
    --accent: #5cc6ff;
    --accent-dim: #2a8fc4;
    --amber: #ffb050;
    --danger: #f44;
    --ok: #5cd682;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Orbitron', monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--font-sans);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-user-select: none; user-select: none;
  }
  #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg-2);
  }
  .brand { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: 3px; color: var(--accent); }
  .ver { color: var(--fg-faint); font-size: 11px; font-family: var(--font-mono); margin-left: auto; }
  .status-pill {
    padding: 3px 8px; font-size: 10px; font-weight: 600; letter-spacing: 1px;
    background: rgba(92,198,255,0.1); color: var(--accent);
    border-radius: 2px; border: 1px solid var(--accent-dim);
  }
  .status-pill.ok { background: rgba(92,214,130,0.12); color: var(--ok); border-color: rgba(92,214,130,0.3); }
  .status-pill.bad { background: rgba(255,68,68,0.12); color: var(--danger); border-color: rgba(255,68,68,0.3); }
  .body { flex: 1; overflow-y: auto; padding: 20px 16px; }
  .orb-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 30px 0;
  }
  .orb {
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%,
      rgba(120, 220, 255, 0.95) 0%,
      rgba(40, 120, 220, 0.85) 35%,
      rgba(20, 40, 100, 0.7) 70%,
      rgba(0, 0, 0, 0.5) 100%);
    box-shadow: 0 0 40px rgba(80, 180, 255, 0.5), inset 0 0 40px rgba(150, 220, 255, 0.4);
    animation: orbpulse 3s ease-in-out infinite;
  }
  @keyframes orbpulse {
    0%, 100% { box-shadow: 0 0 30px rgba(80,180,255,0.5), inset 0 0 30px rgba(150,220,255,0.4); }
    50% { box-shadow: 0 0 60px rgba(80,200,255,0.8), inset 0 0 50px rgba(180,230,255,0.6); }
  }
  .card {
    background: var(--bg-2); border: 1px solid var(--border);
    padding: 14px; margin-bottom: 12px; border-radius: 4px;
  }
  .card-h {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    color: var(--fg-faint); margin-bottom: 10px; text-transform: uppercase;
  }
  .meta-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
  .meta-row .k { color: var(--fg-faint); }
  .meta-row .v { font-family: var(--font-mono); color: var(--fg); }
  .btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 4px;
    font-weight: 700; font-size: 13px; letter-spacing: 1.5px;
    cursor: pointer; text-transform: uppercase;
  }
  .btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent-dim); }
  .btn:active { transform: scale(0.98); }
  .nav {
    display: flex; border-top: 1px solid var(--border); background: var(--bg-2);
  }
  .nav-btn {
    flex: 1; padding: 12px 4px; background: transparent; border: none;
    color: var(--fg-faint); font-size: 10px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer;
  }
  .nav-btn.on { color: var(--accent); }
  .nav-glyph { font-size: 18px; display: block; margin-bottom: 2px; }
  .log {
    font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint);
    background: #06070b; padding: 10px; border-radius: 2px; margin-top: 8px;
    max-height: 200px; overflow: auto; white-space: pre-wrap;
  }
  input.field {
    width: 100%; padding: 10px; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 2px;
    font-family: var(--font-mono); font-size: 12px; margin-bottom: 8px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="brand">JARVIS</span>
    <span class="ver" id="ver">v1.0.0</span>
    <span class="status-pill" id="status">PRÊT</span>
  </div>

  <div class="body" id="body"></div>

  <div class="nav">
    <button class="nav-btn on" data-tab="home"><span class="nav-glyph">◉</span>HOME</button>
    <button class="nav-btn" data-tab="control"><span class="nav-glyph">⌬</span>CONTROL</button>
    <button class="nav-btn" data-tab="settings"><span class="nav-glyph">⚙</span>SETTINGS</button>
    <button class="nav-btn" data-tab="logs"><span class="nav-glyph">▤</span>LOGS</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
